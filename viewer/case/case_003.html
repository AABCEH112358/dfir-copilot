<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrueLedger Supply Chain — DFIR Co-pilot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { mono: ['ui-monospace', 'monospace'] } } } }</script>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body data-case="003" class="bg-slate-950 text-slate-100 min-h-screen">
  <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-wrap items-center justify-between gap-4">
      <a href="../index.html" class="text-slate-400 hover:text-white text-sm">← All cases</a>
      <div class="flex items-center gap-3">
        <button type="button" onclick="window.print()" class="text-xs px-3 py-1.5 rounded border border-slate-600 text-slate-300 hover:bg-slate-800">Download PDF</button>
        <a href="#" id="play-case" class="text-xs px-3 py-1.5 rounded bg-blue-600 hover:bg-blue-500 text-white">Play case (Band)</a>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <div id="case-error" class="hidden mb-6 p-4 rounded-lg bg-red-500/10 border border-red-500/30 text-red-300">Failed to load case data.</div>

    <div class="mb-8">
      <div class="flex flex-wrap items-center gap-3 mb-2">
        <span id="difficulty-badge" class="text-xs px-2 py-1 rounded border font-medium">—</span>
        <span id="hero-badge" class="hidden text-xs px-2 py-1 rounded bg-amber-500/20 text-amber-300 border border-amber-500/30">★ Hero demo</span>
        <span class="text-xs px-2 py-1 rounded bg-emerald-500/20 text-emerald-300 border border-emerald-500/30">COMPLETE</span>
      </div>
      <h1 id="case-title" class="text-3xl font-bold text-white mb-1">Loading…</h1>
      <p id="case-org" class="text-slate-400"></p>
      <p class="text-xs font-mono text-slate-600 mt-2"><span id="case-id"></span> · Opened <span id="case-opened"></span> · Closed <span id="case-closed"></span></p>
    </div>

    <nav class="flex flex-wrap gap-1 mb-6 border-b border-slate-800 pb-px" role="tablist">
      <button data-tab="summary" class="px-4 py-2 text-sm rounded-t-lg text-white border-slate-700 bg-slate-800/80 border border-b-0">Summary</button>
      <button data-tab="timeline" class="px-4 py-2 text-sm rounded-t-lg text-slate-400 border-transparent">What Happened</button>
      <button data-tab="mitre" class="px-4 py-2 text-sm rounded-t-lg text-slate-400 border-transparent">MITRE Mapping</button>
      <button data-tab="evidence" class="px-4 py-2 text-sm rounded-t-lg text-slate-400 border-transparent">Evidence Catalog</button>
      <button data-tab="audit" class="px-4 py-2 text-sm rounded-t-lg text-slate-400 border-transparent">Audit Chain</button>
      <button data-tab="actions" class="px-4 py-2 text-sm rounded-t-lg text-slate-400 border-transparent">Recommended Actions</button>
    </nav>

    <div data-panel="summary" class="prose-invert max-w-none"><div id="summary-content" class="text-slate-300"></div></div>
    <div data-panel="timeline" class="hidden"><div id="brief-content" class="mb-6 text-slate-400 text-sm"></div><div id="timeline-content"></div></div>
    <div data-panel="mitre" class="hidden"><div id="mitre-content"></div></div>
    <div data-panel="evidence" class="hidden"><div id="evidence-content"></div></div>
    <div data-panel="audit" class="hidden"><div id="audit-content"></div></div>
    <div data-panel="actions" class="hidden"><div id="actions-content"></div></div>
  </main>

  <footer class="border-t border-slate-800 mt-16 py-8 text-center text-slate-600 text-sm">
    DFIR Co-pilot · Band of Agents Hackathon 2026 · Track 3
  </footer>
  <script src="../assets/app.js"></script>
  <script src="../assets/case.js"></script>
</body>
</html>
